apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-app-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/dardangerguri/KubernetesSubmissions.git'
    targetRevision: HEAD
    path: the_project/manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: project
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
