name: Release application
on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}
  GKE_CLUSTER: dwk-cluster
  GKE_ZONE: europe-north1-b
  REGISTRY: europe-north1-docker.pkg.dev
  REPOSITORY: gke-apps-repo

jobs:
  build-publish-deploy:
    name: Build, Publish and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}"
          service_account: "${{ secrets.SERVICE_ACCOUNT }}"

      - name: 'Set up Cloud SDK'
        uses: google-github-actions/setup-gcloud@v3

      - name: 'Configure Docker Registry'
        run: gcloud --quiet auth configure-docker $REGISTRY

      - name: 'Get GKE credentials'
        uses: 'google-github-actions/get-gke-credentials@v3'
        with:
          cluster_name: '${{ env.GKE_CLUSTER }}'
          project_id: '${{ env.PROJECT_ID }}'
          location: '${{ env.GKE_ZONE }}'

      - name: 'Form image names'
        run: |
          echo "BACKEND_IMAGE=$REGISTRY/$PROJECT_ID/$REPOSITORY/todo-backend:$GITHUB_SHA" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=$REGISTRY/$PROJECT_ID/$REPOSITORY/todo-frontend:$GITHUB_SHA" >> $GITHUB_ENV

      - name: Build and Publish Backend
        run: |
          docker build --tag $BACKEND_IMAGE ./the_project/backend
          docker push $BACKEND_IMAGE

      - name: Build and Publish Frontend
        run: |
          docker build --tag $FRONTEND_IMAGE ./the_project/frontend
          docker push $FRONTEND_IMAGE

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Deploy
        run: |
          cd the_project/manifests

          kustomize edit set image todo-backend=$BACKEND_IMAGE
          kustomize edit set image todo-frontend=$FRONTEND_IMAGE

          kustomize build . | kubectl apply -f -

          kubectl rollout status deployment/todo-backend-dep -n project
          kubectl rollout status deployment/todo-app-dep -n project
          kubectl get services -o wide -n project
