name: Release application
on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*'

permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}
  GKE_CLUSTER: dwk-cluster
  GKE_ZONE: europe-north1-b
  REGISTRY: europe-north1-docker.pkg.dev
  REPOSITORY: gke-apps-repo

jobs:
  build-publish-deploy:
    name: Build, Publish and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'write'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}"
          service_account: "${{ secrets.SERVICE_ACCOUNT }}"

      - name: 'Set up Cloud SDK'
        uses: google-github-actions/setup-gcloud@v3

      - name: 'Configure Docker Registry'
        run: gcloud --quiet auth configure-docker $REGISTRY

      - name: 'Form image names'
        run: |
          echo "BACKEND_IMAGE=$REGISTRY/$PROJECT_ID/$REPOSITORY/todo-backend:$GITHUB_SHA" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=$REGISTRY/$PROJECT_ID/$REPOSITORY/todo-frontend:$GITHUB_SHA" >> $GITHUB_ENV
          echo "BROADCASTER_IMAGE=$REGISTRY/$PROJECT_ID/$REPOSITORY/todo-broadcaster:$GITHUB_SHA" >> $GITHUB_ENV

      - name: Set namespace
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "NAMESPACE=project" >> $GITHUB_ENV
          else
            echo "NAMESPACE=$GITHUB_REF_NAME" >> $GITHUB_ENV
          fi

      - name: Build and Publish Backend
        run: |
          docker build --tag $BACKEND_IMAGE ./the_project/backend
          docker push $BACKEND_IMAGE

      - name: Build and Publish Frontend
        run: |
          docker build --tag $FRONTEND_IMAGE ./the_project/frontend
          docker push $FRONTEND_IMAGE

      - name: Build and Publish Broadcaster
        run: |
          docker build --tag $BROADCASTER_IMAGE ./the_project/broadcaster
          docker push $BROADCASTER_IMAGE

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Update Manifests and Commit
        run: |
          cd the_project/manifests

          kustomize edit set image europe-north1-docker.pkg.dev/${{ secrets.GKE_PROJECT }}/gke-apps-repo/todo-backend=$BACKEND_IMAGE
          kustomize edit set image europe-north1-docker.pkg.dev/${{ secrets.GKE_PROJECT }}/gke-apps-repo/todo-frontend=$FRONTEND_IMAGE
          kustomize edit set image europe-north1-docker.pkg.dev/${{ secrets.GKE_PROJECT }}/gke-apps-repo/todo-broadcaster=$BROADCASTER_IMAGE

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add kustomization.yaml
          git commit -m "chore: update image tags to $GITHUB_SHA [skip ci]"
          git push origin $GITHUB_REF_NAME
